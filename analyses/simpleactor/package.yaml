name:                simpleactor
version:             0.1.0.0
github:              "bramvdbogaerde/simplecc"
license:             BSD-3-Clause
author:              "Author name here"
maintainer:          "bram@vdb.space"
copyright:           "2024 Bram Vandenbogaerde"

language: GHC2021

extra-source-files:
- README.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/interpreter#readme>

dependencies:
- base >= 4.7 && < 5
- hspec
- hspec-contrib
- deepseq
- rio <= 1.22.0
- extra
- singletons
- directory
- concurrent-extra
- parallel-io
- pretty-simple
- unix
- aeson
- regex-compat
- ghc-experimental


ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wno-missing-export-lists
- -Wno-x-partial
- -Wmissing-home-modules
- -Wpartial-fields
- -O3
- -fspecialise
- -fexpose-all-unfoldings
- -flate-dmd-anal
- -Wredundant-constraints
- -Werror

default-extensions:
  - TypeFamilies
  - DataKinds
  - GeneralizedNewtypeDeriving
  - TemplateHaskell
  - GADTs
  - FunctionalDependencies
  - RecordWildCards
  - LambdaCase # supported by GHC2024
  
library:
  source-dirs: src
  ghc-options:
    - -threaded
    - -fprint-potential-instances
  dependencies:
    - containers 
    - unordered-containers 
    - mtl
    - transformers
    - maf2-syntax
    - maf2-domains
    - maf2-analysis
    - maf2-scv
    - lens
    - concurrency
    - exceptions
    - process
    - layers-mtl
    - random

executables:
  simpleactor-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - containers
    - Glob
    - optparse-applicative
    - simpleactor
    - maf2-syntax
    - maf2-domains
    - maf2-analysis
    - filepath
    - time
    - timeit
    - pretty-simple
    - mtl
    - criterion
    - clock
    
tests:
  simpleactor-tests:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - simpleactor
    - maf2-analysis
